<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site</title>

<style>
body {
margin: 0;
}

.desktop {
display: block;
width: 100%;
}

.mobile {
display: none;
width: 100%;
}

@media (max-width: 768px) {
.desktop {
display: none;
}
.mobile {
display: block;
}
}

.container {
position: relative;
}

.overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 2;
}
</style>
</head>

<body oncontextmenu="return false;">

<!-- Desktop -->
<div class="container">
<img src="desktop.jpg" class="desktop" draggable="false">
<div class="overlay"></div>
</div>

<!-- Mobile -->
<div class="container">
<img src="mobile (2).jpg" class="mobile" draggable="false">
<div class="overlay"></div>
</div>

</body>
</html>
