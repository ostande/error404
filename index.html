<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ostande</title>
<!-- indique que ya du html + ya des caractères français + contrôle l'affichage plein écran sur tous les appareil
à 100% + ostande c'est le nom de la page qui s'affiche sur l'onglet -->

<style>

/* On switch en CSS */
  
body {margin: 0;}
/* supprime la marge pour que l'image occupe tout l'espace */

.container {position: relative;}
/* défini un conteneur (utile pour après) */

.overlay {position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 2;}
/* crée une couche sur tout le conteneur */

/* on reviens en html */
  
</style>
</head>

<body oncontextmenu="return false;">
<!-- stop le clique droit -->

<div class="container">
    
    <picture>
      <source media="(max-width: 768px)" srcset="banana.jpg">
      <img src="clementine.jpg" style="width:100%; display:block;" draggable="false">
    </picture>
    <!-- si l'écran est en dessous de 768px (téléphone), le site charge la version mobile,
    sinon elle charge l'autre -->

    <div class="overlay"></div>
    <!-- crée une couche par dessus l'image pour la protéger -->

   <a href="https://google.com" target="_blank" rel="noopener noreferrer" style="
    position:absolute;
    top:30%;
    left:25%;
    width:30%;
    height:15%;
    z-index:5;
    background:red;
    opacity:0.3;
  "></a>
  <!-- ajouter une zone cliquable sur version desktop - les % en rouge sont la position et la taille 
  + les 2 dernières lignes (background et opacity) permette de voir la zone temporairement (à enlever) 
  !!A FAIRE!! : améliorer le process du bouton comme a dit GBT (bien quand j'en aurai plusieurs) -->

  </div>

  
</body>
</html>
