<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ostande</title>
<!-- indique que ya du html + ya des caractères français + contrôle l'affichage plein écran sur tous les appareil
à 100% + ostande c'est le nom de la page qui s'affiche sur l'onglet -->

<style>

/* On switch en CSS */
  
body {margin: 0;}
/* supprime la marge pour que l'image occupe tout l'espace */

.container {position: relative;}
/* défini un conteneur (utile pour après) */

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  /* index = position avant/arrière */
}
/* crée la condition pour une couche de protection */

.zone {
  position: absolute;
  z-index: 5;
  /* donc les boutons passent par dessus le overlay */
  background: red;
  opacity: 0.0;
}
/* crée le cadre pour les boutons cliquables et leur zones colorées temporaire (supp -> opacity: 0) */

/* Desktop visible par défaut */
.zone-desktop {
  display: block;
}

/* Mobile caché par défaut */
.zone-mobile {
  display: none;
}

/* Quand écran ≤ 768px */
@media (max-width: 768px) {

  .zone-desktop {
    display: none;
  }

  .zone-mobile {
    display: block;
  }

/* on quitte le CSS*/ 
</style>
</head>

<body oncontextmenu="return false;">
<!-- stop le clique droit -->

<div class="container">
    
    <picture>
      <source media="(max-width: 768px)" srcset="banana.jpg">
      <img src="chocolat.jpg" style="width:100%; display:block;" draggable="false">
    </picture>
    <!-- si l'écran est en dessous de 768px (téléphone), le site charge la version mobile,
    sinon elle charge l'autre -->

    <div class="overlay"></div>
    <!-- crée une couche par dessus l'image pour la protéger -->

<!-- Desktop boutons -->
<a href="page1.html" class="zone zone-desktop" style="top:18%; left:35%; width:30%; height:15%;"></a>
<a href="page2.html" class="zone zone-desktop" style="top:45%; left:47%; width:5%; height:5%;"></a>

<!-- Mobile boutons -->
<a href="page1.html" class="zone zone-mobile" style="top:15%; left:20%; width:60%; height:8%;"></a>
<a href="page2.html" class="zone zone-mobile" style="top:60%; left:20%; width:80%; height:15%;"></a>

<!-- ajouter une zone cliquable sur version desktop - les % en rouge sont la position et la taille -->

  </div>

</body>
</html>
